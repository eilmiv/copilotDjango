{% extends "helloworld/base.html" %}
{% block title %}Create World{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>🌍 Create a New World</h2>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.name.id_for_label }}" class="form-label">World Name</label>
                <input type="text" class="form-control" id="{{ form.name.id_for_label }}" name="name" placeholder="Enter world name" required>
                {% if form.name.errors %}
                <div class="invalid-feedback d-block">{{ form.name.errors }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-primary">Create World</button>
            <a href="{% url 'helloworld:world_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
