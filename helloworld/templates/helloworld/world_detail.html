{% extends "helloworld/base.html" %}
{% block title %}{{ world.name }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>🌍 {{ world.name }}</h2>
    </div>
    <div class="card-body">
        <p class="display-6">Hello World count: <strong>{{ world.hello_count }}</strong></p>
        <form method="post" action="{% url 'helloworld:send_hello' world.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-success btn-lg">👋 Say Hello!</button>
        </form>
    </div>
    <div class="card-footer text-muted">
        Created: {{ world.created_at|date:"F j, Y" }}
    </div>
</div>
<a href="{% url 'helloworld:world_list' %}" class="btn btn-secondary mt-3">← Back to Worlds</a>
{% endblock %}
